name: fake_call_prank
description: Consent-based prank/skit call recorder with sequential chunks, Person B pitch control, FFmpeg merge, and telephone effect.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  record: ^7.0.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.2
  ffmpeg_kit_flutter_new: ^1.6.1
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
